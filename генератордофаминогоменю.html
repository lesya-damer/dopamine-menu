<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Моё дофаминовое меню</title>
<style>
:root {
  --bg: #f8f5f2;
  --card: rgba(255,255,255,0.88);
  --text: #2c2522;
  --accent: #8b7df0;
  --accent-soft: #b3a7ff;
  --glass-border: rgba(255,255,255,0.6);
  --radius: 28px;
  /* Новый красивый шрифт для русского */
  --font: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  padding-bottom: 40px;
  font-feature-settings: "kern" 1, "tnum" 1, "ss01" 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.glass {
  background: var(--card);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 10px 35px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.7);
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 20px;
}

.header {
  text-align: center;
  padding: 48px 20px 32px;
}

.title {
  font-size: 33px;
  font-weight: 700;
  letter-spacing: -1.4px;
  margin: 0 0 14px;
}

.subtitle {
  font-size: 16.5px;
  color: #6b6a66;
  max-width: 440px;
  margin: 0 auto;
  line-height: 1.6;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: #6b6a66;
  margin: 32px 0 16px;
  letter-spacing: 0.6px;
}

.category-card {
  padding: 24px;
  margin-bottom: 18px;
}

.category-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.category-icon {
  font-size: 26px;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(139, 125, 240, 0.1);
  border-radius: 9999px;
}

.category-info h3 {
  margin: 0;
  font-size: 18.5px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.category-info p {
  margin: 3px 0 0;
  font-size: 13.5px;
  color: #6b6a66;
}

.add-form {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.add-form input {
  flex: 1;
  padding: 15px 18px;
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  font-size: 15.5px;
  background: white;
  outline: none;
  font-family: var(--font);
}

.add-form button {
  padding: 15px 26px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 18px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.add-form button:active {
  transform: scale(0.96);
}

.idea-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.idea-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.6);
  padding: 13px 16px;
  border-radius: 16px;
  font-size: 15.5px;
}

.theme-dark .idea-item {
  background: rgba(255,255,255,0.08);
}

.delete-btn {
  background: none;
  border: none;
  color: #c9a9a9;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 9999px;
  transition: all 0.2s;
  line-height: 1;
}

.delete-btn:hover {
  color: #f87171;
  background: rgba(248, 113, 113, 0.1);
}

/* PREVIEW */
.preview-wrapper {
  margin-top: 48px;
}

.preview {
  background: linear-gradient(145deg, #f8f5f2, #f0e9df);
  border-radius: 32px;
  padding: 44px 34px 50px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  border: 1px solid #e8e0d4;
  max-width: 620px;
  margin: 0 auto;
}

.preview-header {
  text-align: center;
  margin-bottom: 34px;
}

.preview-title {
  font-size: 27px;
  font-weight: 700;
  letter-spacing: -1px;
  margin: 0 0 8px;
  color: #2c2522;
}

.preview-subtitle {
  font-size: 14.5px;
  color: #8a8178;
  margin: 0;
}

.preview-section {
  margin-bottom: 26px;
}

.preview-section:last-child {
  margin-bottom: 0;
}

.preview-section h4 {
  font-size: 15.5px;
  font-weight: 600;
  color: #5c5249;
  margin: 0 0 11px;
  display: flex;
  align-items: center;
  gap: 9px;
  letter-spacing: -0.2px;
}

.preview-section ul {
  margin: 0;
  padding-left: 6px;
  list-style: none;
}

.preview-section li {
  font-size: 16px;
  color: #3f3730;
  margin-bottom: 8px;
  padding-left: 6px;
  position: relative;
  line-height: 1.45;
}

.preview-section li:before {
  content: "•";
  color: #a38cff;
  position: absolute;
  left: -14px;
}

.preview-footer {
  text-align: center;
  margin-top: 38px;
  padding-top: 26px;
  border-top: 1px solid #e8e0d4;
  font-size: 13.5px;
  color: #8a8178;
  font-style: italic;
  letter-spacing: 0.2px;
}

/* BUTTONS */
.action-buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}

.btn {
  flex: 1;
  min-width: 140px;
  padding: 17px 24px;
  border-radius: 9999px;
  font-weight: 600;
  font-size: 15.5px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font);
}

.btn-primary {
  background: linear-gradient(135deg, #8b7df0, #b3a7ff);
  color: white;
  box-shadow: 0 6px 20px rgba(139, 125, 240, 0.35);
}

.btn-secondary {
  background: white;
  color: #5c5249;
  border: 1px solid #d4c9b8;
}

.btn-danger {
  background: #fff0f0;
  color: #d46b6b;
  border: 1px solid #f5caca;
}

.btn:active {
  transform: scale(0.97);
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #2c2522;
  color: white;
  padding: 14px 26px;
  border-radius: 9999px;
  font-size: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-8px);
}
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1 class="title">Моё дофаминовое меню</h1>
    <p class="subtitle">Собери свою коллекцию маленьких радостей, которые помогают тебе чувствовать себя лучше каждый день.</p>
  </div>

  <!-- CATEGORIES -->
  <div id="categories"></div>

  <!-- ACTION BUTTONS -->
  <div class="action-buttons">
    <button onclick="fillWithExamples()" class="btn btn-secondary">✨ Заполнить примером</button>
    <button onclick="clearAll()" class="btn btn-danger">Очистить всё</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-wrapper">
    <div class="section-title" style="text-align:center; margin-bottom:12px;">Предпросмотр</div>
    
    <div id="preview" class="preview">
      <!-- Рендерится через JS -->
    </div>

    <div style="text-align:center; margin-top:24px;">
      <button onclick="downloadPNG()" class="btn btn-primary" style="padding:18px 42px; font-size:16.5px; width:100%; max-width:380px;">
        📸 Скачать меню картинкой
      </button>
    </div>
  </div>

</div>

<script>
// ==================== DATA ====================
const categoryConfig = [
  { key: 'snacks',     title: 'Закуски',           subtitle: '1–5 минут',              icon: '🥟' },
  { key: 'mains',      title: 'Основные блюда',    subtitle: '10–30 минут',            icon: '🍲' },
  { key: 'desserts',   title: 'Десерты',           subtitle: 'Приятные удовольствия',  icon: '🍰' },
  { key: 'drinks',     title: 'Напитки',           subtitle: 'Быстрые способы переключиться', icon: '🥤' },
  { key: 'special',    title: 'Особые блюда',      subtitle: 'Большие события',        icon: '✨' },
  { key: 'notHelp',    title: 'Что мне не подходит', subtitle: 'Что не приносит радости', icon: '🚫' }
];

let data = loadData();

function loadData() {
  const saved = localStorage.getItem('dopamineMenu');
  if (saved) return JSON.parse(saved);
  return { snacks: [], mains: [], desserts: [], drinks: [], special: [], notHelp: [] };
}

function saveData() {
  localStorage.setItem('dopamineMenu', JSON.stringify(data));
  renderPreview();
}

// ==================== RENDER CATEGORIES ====================
function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  categoryConfig.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'glass category-card';

    const items = data[cat.key] || [];

    card.innerHTML = `
      <div class="category-header">
        <div class="category-icon">${cat.icon}</div>
        <div class="category-info">
          <h3>${cat.title}</h3>
          <p>${cat.subtitle}</p>
        </div>
      </div>

      <div class="add-form">
        <input type="text" id="input-${cat.key}" placeholder="Добавить идею...">
        <button onclick="addItem('${cat.key}')">Добавить</button>
      </div>

      <div class="idea-list" id="list-${cat.key}">
        ${items.length === 0 ? 
          `<div style="color:#9c9286; font-size:14px; padding:4px 0;">Пока ничего не добавлено</div>` : 
          items.map((item, index) => `
            <div class="idea-item">
              <span>${item}</span>
              <button class="delete-btn" onclick="deleteItem('${cat.key}', ${index})">×</button>
            </div>
          `).join('')
        }
      </div>
    `;

    container.appendChild(card);

    const input = card.querySelector(`#input-${cat.key}`);
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addItem(cat.key);
    });
  });
}

function addItem(key) {
  const input = document.getElementById(`input-${key}`);
  const value = input.value.trim();
  if (!value) return;

  if (!data[key]) data[key] = [];
  data[key].push(value);
  input.value = '';

  saveData();
  renderCategories();
}

function deleteItem(key, index) {
  data[key].splice(index, 1);
  saveData();
  renderCategories();
}

// ==================== PREVIEW ====================
function renderPreview() {
  const preview = document.getElementById('preview');
  preview.innerHTML = `
    <div class="preview-header">
      <h2 class="preview-title">Моё дофаминовое меню</h2>
      <p class="preview-subtitle">Маленькие радости каждый день</p>
    </div>
  `;

  let hasContent = false;

  categoryConfig.forEach(cat => {
    const items = data[cat.key] || [];
    if (items.length === 0) return;
    hasContent = true;

    const section = document.createElement('div');
    section.className = 'preview-section';
    section.innerHTML = `
      <h4>${cat.icon} ${cat.title}</h4>
      <ul>
        ${items.map(item => `<li>${item}</li>`).join('')}
      </ul>
    `;
    preview.appendChild(section);
  });

  if (!hasContent) {
    preview.innerHTML += `
      <div style="text-align:center; padding:40px 20px; color:#8a8178;">
        <div style="font-size:42px; margin-bottom:12px;">🌿</div>
        <p>Добавьте хотя бы несколько идей,<br>чтобы увидеть красивое меню</p>
      </div>
    `;
  }

  const footer = document.createElement('div');
  footer.className = 'preview-footer';
  footer.innerHTML = `Маленькие радости — большие перемены`;
  preview.appendChild(footer);
}

// ==================== DOWNLOAD PNG ====================
function downloadPNG() {
  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1350;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, 0, 1350);
  grad.addColorStop(0, '#f8f5f2');
  grad.addColorStop(1, '#f0e9df');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1080, 1350);

  ctx.strokeStyle = '#e8e0d4';
  ctx.lineWidth = 12;
  ctx.strokeRect(30, 30, 1020, 1290);

  ctx.fillStyle = '#2c2522';
  ctx.font = '700 68px Inter, system-ui, -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Моё дофаминовое меню', 540, 130);

  ctx.font = '400 32px Inter, system-ui, -apple-system, sans-serif';
  ctx.fillStyle = '#8a8178';
  ctx.fillText('Маленькие радости каждый день', 540, 175);

  let y = 240;
  let hasItems = false;

  categoryConfig.forEach(cat => {
    const items = data[cat.key] || [];
    if (items.length === 0) return;
    hasItems = true;

    ctx.font = '600 34px Inter, system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#5c5249';
    ctx.textAlign = 'left';
    ctx.fillText(`${cat.icon}  ${cat.title}`, 90, y);
    y += 52;

    ctx.font = '400 30px Inter, system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#3f3730';

    items.forEach(item => {
      const maxWidth = 880;
      let words = item.split(' ');
      let line = '';
      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + ' ';
        if (ctx.measureText(testLine).width > maxWidth) {
          ctx.fillText('•  ' + line, 110, y);
          line = words[n] + ' ';
          y += 46;
        } else {
          line = testLine;
        }
      }
      ctx.fillText('•  ' + line, 110, y);
      y += 50;
    });
    y += 30;
  });

  if (!hasItems) {
    ctx.font = '400 36px Inter, system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#8a8178';
    ctx.textAlign = 'center';
    ctx.fillText('Добавьте идеи, чтобы увидеть меню', 540, 620);
  }

  ctx.font = 'italic 28px Inter, system-ui, -apple-system, sans-serif';
  ctx.fillStyle = '#8a8178';
  ctx.textAlign = 'center';
  ctx.fillText('Маленькие радости — большие перемены', 540, 1260);

  const link = document.createElement('a');
  link.download = 'dopamine-menu.png';
  link.href = canvas.toDataURL('image/png');
  link.click();

  showToast('Меню сохранено как PNG');
}

// ==================== EXAMPLES ====================
function fillWithExamples() {
  const examples = {
    snacks: ["Выпить стакан воды с лимоном", "Потянуться 2 минуты", "Послушать любимую песню", "Посмотреть в окно 1 минуту"],
    mains: ["Прогулка без телефона", "Почитать 20 страниц книги", "Сделать растяжку", "Приготовить себе чай"],
    desserts: ["Посмотреть 1 серию любимого сериала", "Съесть шоколадку медленно", "Полежать под пледом", "Посмотреть красивые фото"],
    drinks: ["Травяной чай с мятой", "Стакан холодной воды", "Кофе с корицей", "Лимонад с мятой"],
    special: ["Встреча с близким человеком", "Поездка за город", "Массаж или спа", "Новый опыт или хобби"],
    notHelp: ["Бесконечный скроллинг", "Сравнивать себя с другими", "Пропускать приём пищи"]
  };

  Object.keys(examples).forEach(key => {
    data[key] = [...examples[key]];
  });

  saveData();
  renderCategories();
  showToast('Меню заполнено примерами');
}

// ==================== CLEAR ALL ====================
function clearAll() {
  if (!confirm('Очистить всё меню? Это действие нельзя отменить.')) return;

  data = { snacks: [], mains: [], desserts: [], drinks: [], special: [], notHelp: [] };
  saveData();
  renderCategories();
  showToast('Меню очищено');
}

// ==================== TOAST ====================
function showToast(text) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2400);
}

// ==================== INIT ====================
function init() {
  renderCategories();
  renderPreview();
  console.log('%c[Дофаминовое меню] Шрифт обновлён на более красивый ✨', 'color:#8b7df0');
}

init();
</script>
</body>
</html>
